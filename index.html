<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="บันทึกรายรับรายจ่ายรายเดือน" />
  <title>Cash Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <div class="app-glow" aria-hidden="true"></div>
    <header class="header">
      <p class="eyebrow">Private ledger</p>
      <h1 class="logo">Cash Book</h1>
      <p class="tagline">รายรับ · รายจ่าย · งวดบัญชี</p>
    </header>

    <section class="toolbar glass" aria-label="เลือกเดือน">
      <button type="button" class="btn btn-icon month-nav" id="prevMonth" aria-label="ก่อนหน้า">‹</button>
      <div class="month-display">
        <span id="monthLabel" class="month-label"></span>
        <button type="button" class="btn btn-today" id="goToday">วันนี้</button>
      </div>
      <button type="button" class="btn btn-icon month-nav" id="nextMonth" aria-label="ถัดไป">›</button>
    </section>

    <section class="summary" aria-label="สรุป">
      <div class="summary-card income stagger-1">
        <span class="summary-label">รับ</span>
        <span class="summary-value" id="sumIncome">0</span>
      </div>
      <div class="summary-card expense stagger-2">
        <span class="summary-label">จ่าย</span>
        <span class="summary-value" id="sumExpense">0</span>
      </div>
      <div class="summary-card balance stagger-3">
        <span class="summary-label">คงเหลือ</span>
        <span class="summary-value" id="sumBalance">0</span>
      </div>
    </section>
    <section class="summary-split" aria-label="แยกค่าใช้จ่าย">
      <div class="summary-card expense-fixed stagger-4">
        <span class="summary-label">คงที่</span>
        <span class="summary-value" id="sumExpenseFixed">0</span>
      </div>
      <div class="summary-card expense-general stagger-5">
        <span class="summary-label">ทั่วไป</span>
        <span class="summary-value" id="sumExpenseGeneral">0</span>
      </div>
    </section>

    <nav class="tabs glass" role="tablist">
      <button type="button" class="tab active" role="tab" aria-selected="true" data-panel="transactions">รายการ</button>
      <button type="button" class="tab" role="tab" aria-selected="false" data-panel="categories">หมวด</button>
    </nav>

    <section id="panel-transactions" class="panel active" role="tabpanel">
      <div class="panel-head">
        <h2>รายการ</h2>
        <button type="button" class="btn btn-primary" id="openAddTx">เพิ่ม</button>
      </div>
      <ul class="tx-list" id="txList"></ul>
      <p class="empty-hint" id="txEmpty" hidden>ยังไม่มีรายการ</p>
    </section>

    <section id="panel-categories" class="panel" role="tabpanel" hidden>
      <div class="panel-head">
        <h2>หมวดหมู่</h2>
        <button type="button" class="btn btn-primary" id="openAddCat">เพิ่ม</button>
      </div>
      <ul class="cat-list" id="catList"></ul>
      <p class="empty-hint" id="catEmpty" hidden>ยังไม่มีหมวด</p>
    </section>

    <footer class="footer">
      <small id="footerNote">เก็บในเครื่อง</small>
      <div class="footer-actions">
        <button type="button" class="btn btn-ghost btn-sm" id="exportData">ส่งออก</button>
        <label class="btn btn-ghost btn-sm import-label">
          นำเข้า
          <input type="file" id="importData" accept="application/json" hidden />
        </label>
      </div>
    </footer>
  </div>

  <div class="modal-backdrop" id="modalTx" aria-hidden="true">
    <div class="modal glass-modal" role="dialog" aria-labelledby="modalTxTitle">
      <h3 id="modalTxTitle">รายการ</h3>
      <form id="formTx" class="form">
        <input type="hidden" id="txId" />
        <label class="field">
          <span>ประเภท</span>
          <select id="txType" required>
            <option value="income">รับ</option>
            <option value="expense">จ่าย</option>
          </select>
        </label>
        <label class="field">
          <span>วันที่</span>
          <input type="date" id="txDate" required />
        </label>
        <label class="field">
          <span>งวดบัญชี</span>
          <input type="month" id="txBookMonth" title="เว้นว่าง = ตามเดือนของวันที่" />
        </label>
        <label class="field">
          <span>จำนวนเงิน</span>
          <input type="number" id="txAmount" min="0" step="0.01" required placeholder="0" />
        </label>
        <label class="field">
          <span>หมวด</span>
          <select id="txCategory" required></select>
        </label>
        <label class="field">
          <span>หมายเหตุ</span>
          <input type="text" id="txNote" maxlength="200" placeholder="—" />
        </label>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancelTx">ยกเลิก</button>
          <button type="submit" class="btn btn-primary">บันทึก</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-backdrop" id="modalCat" aria-hidden="true">
    <div class="modal glass-modal" role="dialog" aria-labelledby="modalCatTitle">
      <h3 id="modalCatTitle">หมวด</h3>
      <form id="formCat" class="form">
        <input type="hidden" id="catId" />
        <label class="field">
          <span>ใช้กับ</span>
          <select id="catType" required>
            <option value="income">รับ</option>
            <option value="expense">จ่าย</option>
          </select>
        </label>
        <label class="field" id="catExpenseKindWrap" hidden>
          <span>แบ่งจ่าย</span>
          <select id="catExpenseKind">
            <option value="fixed">คงที่</option>
            <option value="general">ทั่วไป</option>
          </select>
        </label>
        <label class="field">
          <span>ชื่อ</span>
          <input type="text" id="catName" required maxlength="80" placeholder="ชื่อหมวด" />
        </label>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancelCat">ยกเลิก</button>
          <button type="submit" class="btn btn-primary">บันทึก</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
